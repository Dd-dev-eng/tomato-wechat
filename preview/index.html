<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>主动番茄 - 预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #ededed;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    background: #fff;
    border-radius: 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .status-bar {
    height: 48px;
    background: #f7f7f7;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    font-size: 12px;
    color: #333;
    flex-shrink: 0;
  }
  .header {
    height: 52px;
    background: #f7f7f7;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    border-bottom: 1px solid #e6e6e6;
    flex-shrink: 0;
  }
  .header-title {
    font-size: 17px;
    font-weight: 600;
    color: #1a1a1a;
    flex: 1;
    text-align: center;
  }
  .sound-toggle {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 20px;
    padding: 4px;
    opacity: 0.6;
    transition: opacity .2s;
  }
  .sound-toggle:hover { opacity: 1; }
  .sound-toggle.on { opacity: 1; }
  .countdown-area {
    padding: 24px 16px;
    background: #f7f7f7;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .countdown-area.hidden { display: none; }
  .countdown-timer {
    font-size: 48px;
    font-weight: 300;
    color: #1a1a1a;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
  }
  .countdown-timer.warning {
    color: #e64340;
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .countdown-activity {
    margin-top: 8px;
    font-size: 16px;
    color: #666;
  }
  .progress-bar {
    width: 100%;
    height: 4px;
    background: #e0e0e0;
    border-radius: 2px;
    margin-top: 16px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #07c160;
    border-radius: 2px;
    transition: width 1s linear;
  }
  .state-bar {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 10px 16px;
    background: #fff;
    border-bottom: 1px solid #e6e6e6;
    font-size: 13px;
    color: #666;
    flex-shrink: 0;
    gap: 10px;
  }
  .state-item {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 8px 12px;
    border-radius: 8px;
    background: #f5f5f5;
    cursor: pointer;
    transition: all 0.2s;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .state-item:hover {
    background: #e8f5e9;
  }
  .state-item.active {
    background: #e8f5e9;
    color: #07c160;
    font-weight: 600;
  }
  .state-item.placeholder {
    color: #999;
  }
  .start-prompt {
    flex: 2;
    padding: 12px 16px;
    background: linear-gradient(135deg, #66bb6a 0%, #43a047 100%);
    color: white;
    border-radius: 10px;
    font-weight: 600;
    text-align: center;
    box-shadow: 0 2px 8px rgba(102, 187, 106, 0.3);
    animation: pulse-prompt 2s ease-in-out infinite;
    cursor: pointer;
  }
  @keyframes pulse-prompt {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    background: #f7f7f7;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .chat-area::-webkit-scrollbar { width: 3px; }
  .chat-area::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  .message {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 15px;
    line-height: 1.6;
    word-break: break-word;
    white-space: pre-wrap;
    animation: msgIn .2s ease;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .message.user {
    align-self: flex-end;
    background: #95ec69;
    color: #1a1a1a;
    border-bottom-right-radius: 2px;
  }
  .message.bot {
    align-self: flex-start;
    background: #fff;
    color: #1a1a1a;
    border-bottom-left-radius: 2px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }
  .message.reminder {
    background: #fff3cd;
    color: #856404;
    border-left: 4px solid #ffc107;
    font-size: 14px;
    animation: reminderPulse .3s ease;
  }
  @keyframes reminderPulse {
    0% { transform: scale(0.9); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .typing-indicator {
    align-self: flex-start;
    background: #fff;
    padding: 12px 16px;
    border-radius: 8px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    display: none;
    gap: 4px;
    border-bottom-left-radius: 2px;
  }
  .typing-indicator.active { display: flex; }
  .typing-dot {
    width: 7px; height: 7px;
    background: #bbb;
    border-radius: 50%;
    animation: dotBounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: .15s; }
  .typing-dot:nth-child(3) { animation-delay: .3s; }
  @keyframes dotBounce {
    0%, 60%, 100% { opacity: .3; transform: translateY(0); }
    30% { opacity: .8; transform: translateY(-4px); }
  }
  .input-area {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    background: #f7f7f7;
    border-top: 1px solid #e6e6e6;
    gap: 8px;
    flex-shrink: 0;
  }
  .input-area input {
    flex: 1;
    height: 38px;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 0 14px;
    font-size: 15px;
    outline: none;
    background: #fff;
  }
  .input-area input:focus { border-color: #07c160; }
  .input-area button {
    width: 60px;
    height: 38px;
    border: none;
    border-radius: 6px;
    background: #07c160;
    color: #fff;
    font-size: 15px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .input-area button:disabled { opacity: .5; cursor: not-allowed; }
  .quick-btns {
    display: flex;
    gap: 6px;
    padding: 8px 12px;
    background: #f7f7f7;
    flex-wrap: wrap;
    flex-shrink: 0;
    border-top: 1px solid #eee;
  }
  .quick-btn {
    padding: 5px 12px;
    border: 1px solid #07c160;
    border-radius: 14px;
    background: #fff;
    color: #07c160;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
  }
  .quick-btn:hover { background: #07c160; color: #fff; }
  .quick-btn.secondary { border-color: #999; color: #666; }
  .quick-btn.secondary:hover { background: #f0f0f0; color: #333; }
  .quick-btn.danger { border-color: #e64340; color: #e64340; }
  .quick-btn.danger:hover { background: #e64340; color: #fff; }
  .empty-actions {
    font-size: 12px;
    color: #999;
    text-align: center;
    padding: 8px 12px;
    background: #f7f7f7;
    border-top: 1px solid #eee;
    display: none;
    flex-shrink: 0;
  }
  .bottom-menu {
    display: flex;
    height: 52px;
    background: #f7f7f7;
    border-top: 1px solid #e0e0e0;
    flex-shrink: 0;
  }
  .menu-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 10px;
    color: #666;
    gap: 2px;
    transition: all .15s;
  }
  .menu-btn:active { opacity: .6; }
  .menu-btn .icon { font-size: 20px; }
  .menu-btn.primary { color: #07c160; }
  .menu-btn.primary .label { font-size: 11px; font-weight: 600; }
  .menu-btn.danger { color: #e64340; }
  .startup-tip {
    text-align: center;
    color: #999;
    font-size: 13px;
    padding: 30px 20px 10px;
    line-height: 1.8;
  }
</style>
</head>
<body>
<div class="phone-frame" id="app">
  <div class="status-bar">
    <span>9:41</span>
    <span>📶 🔋</span>
  </div>
  <div class="header">
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔇</button>
    <span class="header-title">主动番茄</span>
    <span style="width: 28px;"></span>
  </div>

  <div class="countdown-area hidden" id="countdownArea">
    <div class="countdown-timer" id="countdownTimer">00:00</div>
    <div class="countdown-activity" id="countdownActivity">-</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>

  <div class="state-bar" id="stateBar">
    <div class="state-item placeholder" id="activityState" onclick="openActivitySelect()">选择活动</div>
    <div class="state-item placeholder" id="durationState" onclick="openDurationSelect()">选择时长</div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="startup-tip" id="startupTip">
      🍅 欢迎来到<strong>主动番茄</strong>！<br>
      这是一个运行在微信里的番茄钟。<br>
      <span style="font-size:12px;color:#bbb">（预览模式 - 本地模拟）</span>
    </div>
    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <div class="quick-btns" id="quickBtns"></div>
  <div class="empty-actions" id="emptyActions"></div>

  <div class="input-area">
    <input id="msgInput" placeholder="输入消息..."
      onkeydown="if(event.key==='Enter') sendMessage()">
    <button id="sendBtn" onclick="sendMessage()">发送</button>
  </div>

  <div class="bottom-menu">
    <button class="menu-btn primary" id="activityMenuBtn" onclick="sendQuick('__OPEN_ACTIVITY__', '活动')">
      <span class="icon" id="activityMenuIcon">📝</span>
      <span class="label">活动</span>
    </button>
    <button class="menu-btn" id="actionMenuBtn" onclick="sendQuick('__START_OR_END__', '开始/结束')">
      <span class="icon" id="actionMenuIcon">⏯</span>
      <span class="label">开始/结束</span>
    </button>
    <button class="menu-btn" onclick="sendQuick('__SHOW_RECORD__', '今日记录')">
      <span class="icon">📋</span>
      <span class="label">今日记录</span>
    </button>
  </div>
</div>

<script>
const chatArea = document.getElementById('chatArea');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const typing = document.getElementById('typingIndicator');
const startupTip = document.getElementById('startupTip');
const quickBtns = document.getElementById('quickBtns');
const emptyActions = document.getElementById('emptyActions');
const stateBar = document.getElementById('stateBar');
const soundToggle = document.getElementById('soundToggle');
const countdownArea = document.getElementById('countdownArea');
const countdownTimer = document.getElementById('countdownTimer');
const countdownActivity = document.getElementById('countdownActivity');
const progressFill = document.getElementById('progressFill');

let isLoading = false;
let pollTimer = null;
let countdownTimerId = null;
let currentActivity = null;
let soundEnabled = false;
let audioContext = null;
let currentState = null;

// 初始化音频上下文
function initAudio() {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioContext;
}

// 播放提醒音效
function playReminderSound() {
  if (!soundEnabled) return;
  
  const ctx = initAudio();
  if (!ctx) return;
  
  try {
    const oscillator = ctx.createOscillator();
    const gainNode = ctx.createGain();
    
    oscillator.connect(gainNode);
    gainNode.connect(ctx.destination);
    
    oscillator.frequency.setValueAtTime(800, ctx.currentTime);
    oscillator.frequency.setValueAtTime(600, ctx.currentTime + 0.1);
    oscillator.frequency.setValueAtTime(1000, ctx.currentTime + 0.2);
    
    gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
    
    oscillator.start(ctx.currentTime);
    oscillator.stop(ctx.currentTime + 0.4);
  } catch (e) {
    console.error('播放声音失败:', e);
  }
}

// 切换声音开关
function toggleSound() {
  soundEnabled = !soundEnabled;
  soundToggle.textContent = soundEnabled ? '🔊' : '🔇';
  soundToggle.classList.toggle('on', soundEnabled);
  
  if (soundEnabled) {
    initAudio();
    try {
      const ctx = audioContext;
      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(ctx.destination);
      
      oscillator.frequency.setValueAtTime(500, ctx.currentTime);
      gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
      
      oscillator.start(ctx.currentTime);
      oscillator.stop(ctx.currentTime + 0.1);
    } catch (e) {}
  }
}

// 打开活动选择
function openActivitySelect() {
  sendQuick('__OPEN_ACTIVITY__', '活动');
}

// 打开时长选择
function openDurationSelect() {
  sendQuick('__OPEN_ACTIVITY__', '活动');
}

// 格式化倒计时显示
function formatCountdown(seconds) {
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
}

// 启动倒计时
function startCountdown(activity) {
  if (!activity) return;
  
  // 检查是否已经在倒计时同一个活动
  if (currentActivity && currentActivity._id === activity._id && countdownTimerId) {
    return; // 已经在运行，不需要重新启动
  }
  
  // 停止旧的倒计时
  if (countdownTimerId) {
    clearInterval(countdownTimerId);
    countdownTimerId = null;
  }
  
  currentActivity = activity;
  countdownArea.classList.remove('hidden');
  countdownActivity.textContent = activity.name;
  
  const totalSeconds = activity.plannedDuration * 60;
  const startTime = new Date(activity.startTime).getTime();
  
  function update() {
    const now = Date.now();
    const elapsed = Math.floor((now - startTime) / 1000);
    const remaining = Math.max(0, totalSeconds - elapsed);
    
    countdownTimer.textContent = formatCountdown(remaining);
    
    // 进度条
    const progress = Math.min(100, (elapsed / totalSeconds) * 100);
    progressFill.style.width = `${progress}%`;
    
    // 最后1分钟变红并闪烁
    if (remaining <= 60 && remaining > 0) {
      countdownTimer.classList.add('warning');
    } else {
      countdownTimer.classList.remove('warning');
    }
  }
  
  update();
  countdownTimerId = setInterval(update, 1000);
}

// 停止倒计时
function stopCountdown() {
  if (countdownTimerId) {
    clearInterval(countdownTimerId);
    countdownTimerId = null;
  }
  countdownArea.classList.add('hidden');
  countdownTimer.classList.remove('warning');
  currentActivity = null;
}

function formatReply(text) {
  text = text.replace(/\n/g, '<br>');
  text = text.replace(/【([^】]+)】/g, '<strong>$&</strong>');
  text = text.replace(/(🍅|🍳|🎯|💪)/g, '<span style="font-size:18px">$1</span>');
  return text;
}

function addMessage(text, isUser, isReminder) {
  startupTip.style.display = 'none';
  const div = document.createElement('div');
  if (isReminder) {
    div.className = 'message reminder';
    playReminderSound();
  } else {
    div.className = 'message ' + (isUser ? 'user' : 'bot');
  }
  div.innerHTML = formatReply(text);
  chatArea.insertBefore(div, typing);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function actionStyleClass(style) {
  if (style === 'secondary') return ' secondary';
  if (style === 'danger') return ' danger';
  return '';
}

function renderActions(actions) {
  quickBtns.innerHTML = '';
  if (!actions || actions.length === 0) {
    emptyActions.style.display = 'block';
    return;
  }

  emptyActions.style.display = 'none';
  actions.forEach(action => {
    const btn = document.createElement('button');
    btn.className = 'quick-btn' + actionStyleClass(action.style);
    btn.textContent = action.label;
    btn.onclick = () => sendQuick(action.value, action.label);
    quickBtns.appendChild(btn);
  });
}

function renderState(state) {
  if (!state) return;
  currentState = state;

  const hasActivity = !!state.selectedActivity;
  const hasDuration = !!state.selectedDuration;
  
  if (state.ongoing) {
    // 进行中：显示倒计时区域，隐藏状态条
    stateBar.style.display = 'none';
    document.getElementById('actionMenuIcon').textContent = '⏹';
    emptyActions.textContent = '当前活动进行中，点击下方「开始/结束」可结束。';
    if (state.activity) {
      startCountdown(state.activity);
    }
  } else if (state.pendingStart) {
    // 准备就绪：显示醒目的开始提示
    stateBar.style.display = 'flex';
    stateBar.innerHTML = `
      <div class="start-prompt" onclick="sendQuick('__START_OR_END__', '开始/结束')">
        🎯 点击下方「开始/结束」开始专注！
      </div>
    `;
    document.getElementById('actionMenuIcon').textContent = '▶';
    emptyActions.textContent = '';
    stopCountdown();
  } else {
    // 选择阶段：显示活动和时长选择
    stateBar.style.display = 'flex';
    stateBar.innerHTML = `
      <div class="state-item ${hasActivity ? 'active' : 'placeholder'}" onclick="openActivitySelect()">
        ${hasActivity ? '📝 ' + state.selectedActivity : '选择活动'}
      </div>
      <div class="state-item ${hasDuration ? 'active' : 'placeholder'}" onclick="${hasActivity ? 'openDurationSelect()' : 'openActivitySelect()'}">
        ${hasDuration ? '⏱ ' + state.selectedDuration + '分钟' : '选择时长'}
      </div>
    `;
    document.getElementById('actionMenuIcon').textContent = '⏯';
    emptyActions.textContent = '';
    stopCountdown();
  }
}

function showTyping() {
  typing.classList.add('active');
  chatArea.scrollTop = chatArea.scrollHeight;
}

function hideTyping() {
  typing.classList.remove('active');
}

function setLoading(v) {
  isLoading = v;
  sendBtn.disabled = v;
  msgInput.disabled = v;
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || isLoading) return;
  msgInput.value = '';
  await doSend(text, text);
}

async function sendQuick(value, displayText) {
  if (isLoading) return;
  if (value.startsWith('__')) {
    showTyping();
    setLoading(true);
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: value })
      });
      const data = await res.json();
      hideTyping();
      setTimeout(() => {
        addMessage(data.reply, false);
        renderActions(data.actions || []);
        renderState(data.state);
        setLoading(false);
      }, 300);
    } catch (e) {
      hideTyping();
      addMessage('⚠️ 连接失败，请确认服务器已启动', false);
      setLoading(false);
    }
  } else {
    await doSend(value, displayText || value);
  }
}

async function doSend(value, displayText) {
  addMessage(displayText, true);
  showTyping();
  setLoading(true);
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: value })
    });
    const data = await res.json();
    hideTyping();
    setTimeout(() => {
      addMessage(data.reply, false);
      renderActions(data.actions || []);
      renderState(data.state);
      setLoading(false);
    }, 300);
  } catch (e) {
    hideTyping();
    addMessage('⚠️ 连接失败，请确认服务器已启动', false);
    setLoading(false);
  }
}

async function pollStatus() {
  try {
    const res = await fetch('/api/status');
    const state = await res.json();
    
    renderState(state);
    
    if (state.reminders && state.reminders.length > 0) {
      state.reminders.forEach(reminder => {
        addMessage(reminder.message, false, true);
      });
    }
  } catch (e) {
    console.error('轮询失败:', e);
  }
}

async function loadInitialState() {
  try {
    const res = await fetch('/api/status');
    const state = await res.json();
    renderState(state);
    renderActions([
      { label: '选择活动', value: '__OPEN_ACTIVITY__' },
      { label: '查看记录', value: '__SHOW_RECORD__', style: 'secondary' }
    ]);
    
    pollTimer = setInterval(pollStatus, 2000);
  } catch (e) {
    addMessage('⚠️ 预览服务未启动，请稍后重试。', false);
  }
}

loadInitialState();

window.addEventListener('beforeunload', () => {
  if (pollTimer) {
    clearInterval(pollTimer);
  }
  if (countdownTimerId) {
    clearInterval(countdownTimerId);
  }
});
</script>
</body>
</html>
