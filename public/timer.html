<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>主动番茄</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f7f7f7;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .card {
    width: 100%;
    max-width: 360px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 32px 24px;
    text-align: center;
  }
  .icon { font-size: 40px; margin-bottom: 12px; }
  .title { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
  .activity-name { font-size: 16px; color: #07c160; font-weight: 600; margin-bottom: 24px; }

  .timer {
    font-size: 64px;
    font-weight: 300;
    color: #1a1a1a;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }
  .timer.warning {
    color: #e64340;
    animation: blink 1s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .progress-wrap {
    width: 100%;
    height: 6px;
    background: #e8e8e8;
    border-radius: 3px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #07c160, #05a04b);
    border-radius: 3px;
    transition: width 1s linear;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #999;
    margin-bottom: 24px;
  }

  .empty-state { display: none; }
  .empty-state .icon { font-size: 48px; }
  .empty-state .msg { font-size: 15px; color: #999; line-height: 1.8; margin-top: 8px; }
  .empty-state .hint { font-size: 13px; color: #bbb; margin-top: 20px; }

  .tip {
    font-size: 12px;
    color: #bbb;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="card">
  <!-- 倒计时状态 -->
  <div id="timerState">
    <div class="icon">🍅</div>
    <div class="title">主动番茄</div>
    <div class="activity-name" id="actName">-</div>
    <div class="timer" id="timerDisplay">00:00</div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="info-row">
      <span id="elapsedLabel">已过 0 分钟</span>
      <span id="totalLabel">共 0 分钟</span>
    </div>
    <div class="tip">回到微信聊天进行操作</div>
  </div>

  <!-- 空闲状态 -->
  <div id="emptyState" class="empty-state">
    <div class="icon">🍅</div>
    <div class="msg">
      当前没有进行中的活动<br>
      回到微信聊天，<br>
      选择活动开始专注吧～
    </div>
    <div class="hint">本页面会自动刷新</div>
  </div>
</div>

<script>
const timerState = document.getElementById('timerState');
const emptyState = document.getElementById('emptyState');
const timerDisplay = document.getElementById('timerDisplay');
const actName = document.getElementById('actName');
const progressFill = document.getElementById('progressFill');
const elapsedLabel = document.getElementById('elapsedLabel');
const totalLabel = document.getElementById('totalLabel');

let timerId = null;
let currentActivity = null;

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

async function fetchStatus() {
  try {
    const res = await fetch('/api/timer/status');
    const data = await res.json();

    if (data.ongoing) {
      currentActivity = data;
      renderTimer();
    } else {
      currentActivity = null;
      showEmpty();
    }
  } catch (e) {
    showEmpty();
  }
}

function renderTimer() {
  emptyState.style.display = 'none';
  timerState.style.display = 'block';

  actName.textContent = currentActivity.name;
  totalLabel.textContent = '共 ' + currentActivity.plannedDuration + ' 分钟';

  const totalSec = currentActivity.plannedDuration * 60;
  const startMs = new Date(currentActivity.startTime).getTime();

  function update() {
    const elapsed = Math.floor((Date.now() - startMs) / 1000);
    const remaining = Math.max(0, totalSec - elapsed);

    timerDisplay.textContent = formatTime(remaining);

    const pct = Math.min(100, (elapsed / totalSec) * 100);
    progressFill.style.width = pct + '%';

    elapsedLabel.textContent = '已过 ' + Math.floor(elapsed / 60) + ' 分钟';

    if (remaining <= 60 && remaining > 0) {
      timerDisplay.classList.add('warning');
    } else {
      timerDisplay.classList.remove('warning');
    }

    if (remaining <= 0) {
      timerDisplay.textContent = '00:00';
    }
  }

  update();
  if (timerId) clearInterval(timerId);
  timerId = setInterval(update, 1000);
}

function showEmpty() {
  timerState.style.display = 'none';
  emptyState.style.display = 'block';
  if (timerId) { clearInterval(timerId); timerId = null; }
}

// 每3秒轮询一次
fetchStatus();
setInterval(fetchStatus, 3000);
</script>
</body>
</html>
