<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>主动番茄</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1a1a2e;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; min-height: 100dvh;
    color: #eee;
  }
  .card {
    width: 100%; max-width: 360px;
    padding: 40px 24px; text-align: center;
  }

  .label { font-size: 13px; color: #888; margin-bottom: 4px; }
  .name { font-size: 20px; font-weight: 600; color: #07c160; margin-bottom: 32px; }

  .timer-wrap { position: relative; display: inline-block; margin-bottom: 20px; }
  .timer-ring {
    transform: rotate(-90deg);
    width: 200px; height: 200px;
  }
  .timer-ring .bg { fill: none; stroke: #2a2a3e; stroke-width: 6; }
  .timer-ring .fg {
    fill: none; stroke: #07c160; stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear;
  }
  .timer-text {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 42px; font-weight: 300; letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
  }
  .timer-text.warning { color: #e64340; animation: blink 0.6s infinite; }

  .info { display: flex; justify-content: space-between; font-size: 13px; color: #888; margin-bottom: 28px; }
  .info span:last-child { color: #07c160; }

  .btn-row { display: flex; gap: 12px; justify-content: center; }
  .btn {
    border: none; border-radius: 28px; padding: 14px 0; width: 100%;
    font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn:active { transform: scale(0.96); }
  .btn-start { background: #07c160; color: #fff; }
  .btn-end {
    background: transparent; color: #e64340;
    border: 2px solid #e64340;
  }

  .overlay { display: none; }
  .overlay.show { display: flex; }
  .overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    justify-content: center; align-items: center; z-index: 10;
    animation: fadeIn 0.3s;
  }
  .dialog {
    background: #222; border-radius: 20px; padding: 32px 24px;
    text-align: center; max-width: 300px; width: 90%;
  }
  .dialog .emoji { font-size: 48px; margin-bottom: 12px; }
  .dialog h2 { font-size: 20px; color: #07c160; margin-bottom: 12px; }
  .dialog p { font-size: 14px; color: #999; margin-bottom: 24px; line-height: 1.6; }
  .dialog .btn-row { flex-direction: column; gap: 10px; }
  .dialog .btn { width: 100%; }
  .dialog .btn-ghost {
    background: transparent; color: #888;
    border: 1.5px solid #444;
  }

  .setup { display: none; }
  .setup.show { display: block; }
  .setup h2 { font-size: 22px; margin-bottom: 24px; color: #07c160; }
  .field { margin-bottom: 16px; text-align: left; }
  .field label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 12px 14px; border: 1.5px solid #333;
    border-radius: 10px; background: #2a2a3e; color: #eee; font-size: 16px; outline: none;
  }
  .field input:focus { border-color: #07c160; }
  .presets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .preset {
    padding: 8px 16px; border-radius: 20px; border: 1.5px solid #333;
    background: transparent; color: #aaa; font-size: 13px; cursor: pointer;
  }
  .preset.active { border-color: #07c160; color: #07c160; background: rgba(7,193,96,0.1); }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>

<div class="card">

  <div class="setup" id="setup">
    <h2>🍅 主动番茄</h2>
    <div class="field">
      <label>活动名称</label>
      <input id="actInput" placeholder="例如：阅读、学习、运动" value="专注">
    </div>
    <div class="field">
      <label>时长（分钟）</label>
      <div class="presets" id="presets">
        <button class="preset active" data-dur="25">25 分钟</button>
        <button class="preset" data-dur="40">40 分钟</button>
        <button class="preset" data-dur="60">60 分钟</button>
      </div>
      <input id="durInput" type="number" placeholder="自定义分钟数" value="25" min="1" max="180">
    </div>
    <button class="btn btn-start" onclick="startFromSetup()">开始专注 🎯</button>
  </div>

  <div id="timerUI" style="display:none">
    <div class="label" id="statusLabel">正在专注</div>
    <div class="name" id="actName">-</div>

    <div class="timer-wrap">
      <svg class="timer-ring" viewBox="0 0 120 120">
        <circle class="bg" cx="60" cy="60" r="54"/>
        <circle class="fg" id="ring" cx="60" cy="60" r="54"
          stroke-dasharray="339.292"
          stroke-dashoffset="0"/>
      </svg>
      <div class="timer-text" id="timer">00:00</div>
    </div>

    <div class="info">
      <span id="elapsed">已过 0 分钟</span>
      <span id="total">共 0 分钟</span>
    </div>

    <div class="btn-row" id="btnRow">
      <button class="btn btn-end" id="btnEnd" onclick="handleEnd()">结束</button>
    </div>
  </div>

</div>

<!-- 完成弹窗 -->
<div class="overlay" id="overlayDone">
  <div class="dialog">
    <div class="emoji">🍅</div>
    <h2 id="doneTitle">时间到！</h2>
    <p id="doneMsg">你完成了专注</p>
    <button class="btn btn-start" onclick="closeOverlay()">好的</button>
  </div>
</div>

<!-- 提前结束确认弹窗 -->
<div class="overlay" id="overlayConfirm">
  <div class="dialog">
    <div class="emoji">⏹</div>
    <h2>提前结束？</h2>
    <p id="confirmMsg">确定要提前结束吗？</p>
    <div class="btn-row">
      <button class="btn btn-end" onclick="confirmEnd()">确认结束</button>
      <button class="btn btn-ghost" onclick="cancelEnd()">继续专注</button>
    </div>
  </div>
</div>

<script>
const CIRCUMFERENCE = 2 * Math.PI * 54;
let totalSeconds = 0;
let remaining = 0;
let timerStartTime = 0; // 绝对时间起点（毫秒），计时精确度基于此
let timerId = null;
let overtimeId = null;
let overtimeSeconds = 0;
let activityEnded = false;
let serverStartTime = null;
let audioCtx = null;

const setup = document.getElementById('setup');
const timerUI = document.getElementById('timerUI');
const statusLabel = document.getElementById('statusLabel');
const actName = document.getElementById('actName');
const timerEl = document.getElementById('timer');
const ring = document.getElementById('ring');
const elapsedEl = document.getElementById('elapsed');
const totalEl = document.getElementById('total');
const btnEnd = document.getElementById('btnEnd');
const btnRow = document.getElementById('btnRow');
const overlayDone = document.getElementById('overlayDone');
const overlayConfirm = document.getElementById('overlayConfirm');
const doneMsg = document.getElementById('doneMsg');
const doneTitle = document.getElementById('doneTitle');
const confirmMsg = document.getElementById('confirmMsg');

// --- URL 参数 ---
const params = new URLSearchParams(window.location.search);
const urlName = params.get('name');
const urlDur = params.get('duration');
const urlOpenid = params.get('openid');
const urlStartTime = params.get('startTime'); // 服务端时间戳

// --- 服务器 API ---
const API_BASE = '';

async function apiStart(name, duration) {
  if (!urlOpenid) return null;
  try {
    const res = await fetch(API_BASE + '/api/activity/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ openid: urlOpenid, name, duration })
    });
    return await res.json();
  } catch(e) { return null; }
}

async function apiEnd() {
  if (!urlOpenid) return;
  try {
    await fetch(API_BASE + '/api/activity/end', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ openid: urlOpenid })
    });
  } catch(e) {}
}

// --- 设置界面 ---
document.getElementById('presets').addEventListener('click', e => {
  if (e.target.classList.contains('preset')) {
    document.querySelectorAll('.preset').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    document.getElementById('durInput').value = e.target.dataset.dur;
  }
});

async function startFromSetup() {
  const name = document.getElementById('actInput').value.trim() || '专注';
  const dur = parseInt(document.getElementById('durInput').value) || 25;
  const result = await apiStart(name, dur);
  if (result && result.ok && result.activity) {
    const a = result.activity;
    if (result.note) {
      // 已有进行中的活动 → 跳转到当前计时器
      const link = '?name=' + encodeURIComponent(a.name) + '&duration=' + a.plannedDuration + '&startTime=' + a.startTime + '&openid=' + urlOpenid;
      window.location.replace(link);
      return;
    }
    // 新活动已创建 → 更新 URL 为规范格式（和聊天链接一致）
    serverStartTime = a.startTime;
    const newSearch = '?name=' + encodeURIComponent(name) + '&duration=' + dur + '&startTime=' + a.startTime + '&openid=' + urlOpenid;
    window.history.replaceState(null, '', newSearch);
    startTimer(name, dur, a.startTime);
  } else {
    // API 不可用，本地启动
    startTimer(name, dur);
  }
}

// --- 计时核心 ---（基于 Date.now() 绝对时间，不会因后台节流而失准）
// serverStartTs: 服务端记录的开始时间（URL 传入）
// startRemaining: 指定剩余秒数（从服务端时间计算得出）
function startTimer(name, durationMin, serverStartTs, startRemaining) {
  totalSeconds = durationMin * 60;
  const startFromRemaining = (startRemaining !== undefined);
  remaining = startFromRemaining ? startRemaining : totalSeconds;
  activityEnded = false;
  if (serverStartTs) serverStartTime = serverStartTs;

  // 计算绝对时间起点：用服务端时间纠正，否则用本地时间
  if (serverStartTs) {
    timerStartTime = serverStartTs;
  } else {
    timerStartTime = Date.now() - (totalSeconds - remaining) * 1000;
  }

  clearInterval(overtimeId); overtimeId = null; overtimeSeconds = 0;

  actName.textContent = name;
  totalEl.textContent = '共 ' + durationMin + ' 分钟';
  statusLabel.textContent = '正在专注';
  btnEnd.textContent = '结束';
  btnEnd.className = 'btn btn-end';
  btnRow.style.display = '';
  ring.style.stroke = '#07c160';
  timerEl.classList.remove('warning');

  setup.classList.remove('show');
  timerUI.style.display = 'block';

  ring.style.strokeDasharray = CIRCUMFERENCE;
  updateRingAndDisplay();
  clearInterval(timerId);
  timerId = setInterval(tick, 250); // 250ms 刷新，后台唤醒后立即纠正
  saveState();
}

// 每次 tick 根据绝对时间重新计算剩余，不怕后台节流
function tick() {
  const elapsed = Math.floor((Date.now() - timerStartTime) / 1000);
  const newRemaining = Math.max(0, totalSeconds - elapsed);

  if (newRemaining !== remaining) {
    remaining = newRemaining;
    updateRingAndDisplay();
    saveState();
    if (remaining <= 0) done();
  }
}

// 统一更新圆环和文字（避免重复计算）
function updateRingAndDisplay() {
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  timerEl.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');

  const elapsed = totalSeconds - remaining;
  const pct = Math.min(1, elapsed / totalSeconds);
  ring.style.strokeDashoffset = CIRCUMFERENCE * pct;
  elapsedEl.textContent = '已过 ' + Math.floor(elapsed / 60) + ' 分钟';

  if (remaining <= 60 && remaining > 0) {
    timerEl.classList.add('warning');
    ring.style.stroke = '#e64340';
  }
}

// --- 结束按钮 ---
function handleEnd() {
  if (activityEnded) return;
  // 用绝对时间计算实际已过秒数
  const elapsed = Math.max(0, Math.floor((Date.now() - timerStartTime) / 1000));
  const curRemaining = Math.max(0, totalSeconds - elapsed);
  remaining = curRemaining; // 同步
  if (curRemaining <= 0) {
    confirmEnd();
    return;
  }
  // 提前结束，需要确认
  const elapsedMin = Math.floor(elapsed / 60);
  const totalMin = Math.floor(totalSeconds / 60);
  confirmMsg.textContent = '已完成 ' + elapsedMin + ' 分钟，计划 ' + totalMin + ' 分钟。确定要提前结束吗？';
  overlayConfirm.classList.add('show');
}

function confirmEnd() {
  if (activityEnded) return;
  overlayConfirm.classList.remove('show');
  activityEnded = true;
  clearInterval(timerId);
  clearInterval(overtimeId);
  overtimeId = null;
  timerId = null;
  clearState();
  apiEnd();

  // 用绝对时间计算实际专注时长
  const elapsed = Math.max(0, Math.floor((Date.now() - timerStartTime) / 1000));
  remaining = Math.max(0, totalSeconds - elapsed);
  if (remaining > 0) {
    // 提前结束
    const elapsedMin = Math.floor(elapsed / 60);
    showDoneOverlay('已结束', '🍳', '你提前结束了【' + actName.textContent + '】，实际专注 ' + elapsedMin + ' 分钟');
  } else {
    // 正常完成或超时完成
    const totalMin = Math.floor(totalSeconds / 60);
    const overMin = Math.max(0, Math.floor((elapsed - totalSeconds) / 60));
    const extra = overMin > 0 ? '（超时 ' + overMin + ' 分钟）' : '';
    showDoneOverlay('已结束', '🍅', '你完成了【' + actName.textContent + '】' + totalMin + ' 分钟！' + extra);
  }
  btnRow.style.display = 'none';
}

function cancelEnd() {
  overlayConfirm.classList.remove('show');
}

// --- 时间到（不自动结束，只有用户点结束才记录）---
function done() {
  clearInterval(timerId);
  timerId = null;
  timerEl.textContent = '00:00';
  timerEl.classList.add('warning');
  ring.style.strokeDashoffset = CIRCUMFERENCE;
  ring.style.stroke = '#e64340';
  statusLabel.textContent = '已完成';
  // 不调用 apiEnd(), 不弹窗, 不清除状态
  // 启动超时计时器
  overtimeSeconds = 0;
  overtimeId = setInterval(() => {
    overtimeSeconds++;
    updateOvertimeDisplay();
    saveState();
  }, 60000);
  updateOvertimeDisplay();
  saveState();
}

function updateOvertimeDisplay() {
  const m = Math.floor((overtimeSeconds * 60) / 60);
  const h = Math.floor(m / 60);
  if (h > 0) {
    elapsedEl.textContent = '已超时 ' + h + ' 小时 ' + (m % 60) + ' 分';
  } else {
    elapsedEl.textContent = '已超时 ' + m + ' 分钟';
  }
}

function showDoneOverlay(title, emoji, msg) {
  doneTitle.textContent = title;
  document.querySelector('#overlayDone .emoji').textContent = emoji;
  doneMsg.textContent = msg;
  overlayDone.classList.add('show');
  playSound();
}

// --- 已完成的时钟（时间到了但用户还没点结束，显示超时状态）---
function showAlreadyDone(name, durationMin) {
  clearInterval(overtimeId);
  activityEnded = false; // 还没手动结束
  actName.textContent = name;
  totalEl.textContent = '共 ' + durationMin + ' 分钟';
  statusLabel.textContent = '已完成';
  totalSeconds = durationMin * 60;
  remaining = 0;
  setup.classList.remove('show');
  timerUI.style.display = 'block';
  btnRow.style.display = ''; // 保留结束按钮

  timerEl.textContent = '00:00';
  timerEl.classList.add('warning');
  ring.style.strokeDasharray = CIRCUMFERENCE;
  ring.style.strokeDashoffset = CIRCUMFERENCE;
  ring.style.stroke = '#e64340';

  // 计算超时时间
  overtimeSeconds = 0;
  if (urlStartTime) {
    const serverTs = parseInt(urlStartTime);
    const totalSec = durationMin * 60;
    const elapsed = Math.floor((Date.now() - serverTs) / 1000);
    overtimeSeconds = Math.max(0, Math.floor((elapsed - totalSec) / 60));
  }
  // 启动超时计时
  overtimeId = setInterval(() => {
    overtimeSeconds++;
    updateOvertimeDisplay();
    saveState();
  }, 60000);
  updateOvertimeDisplay();
  saveState();
}

function closeOverlay() {
  overlayDone.classList.remove('show');
  timerUI.style.display = 'none';
  setup.classList.add('show');
}

// --- 持久化 ---
const STORAGE_KEY = 'tomato_timer';
function saveState() {
  if (activityEnded) return;
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    name: actName.textContent,
    totalSeconds,
    remaining,
    timerStartTime,           // 绝对时间起点（毫秒），恢复时用这个保证精确
    serverStartTime: serverStartTime || null,
    openid: urlOpenid || '',
    overtimeSeconds,
    isOvertime: remaining <= 0
  }));
}
function clearState() { localStorage.removeItem(STORAGE_KEY); }

// --- 提示音 ---
function playSound() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(800, audioCtx.currentTime);
    o.frequency.setValueAtTime(1000, audioCtx.currentTime + 0.15);
    o.frequency.setValueAtTime(600, audioCtx.currentTime + 0.3);
    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
    o.start(); o.stop(audioCtx.currentTime + 0.5);
  } catch(e) {}
}

// --- 恢复计时（从 localStorage 恢复）---
function startTimerFrom(name, durationMin, startRemaining, savedServerTs, savedTimerStartTime) {
  totalSeconds = durationMin * 60;
  remaining = startRemaining;
  activityEnded = false;
  if (savedServerTs) serverStartTime = savedServerTs;

  // 用保存的绝对时间起点（如果有），否则反算一个近似值
  if (savedTimerStartTime) {
    timerStartTime = savedTimerStartTime;
  } else {
    timerStartTime = Date.now() - (totalSeconds - remaining) * 1000;
  }

  clearInterval(overtimeId); overtimeId = null; overtimeSeconds = 0;

  actName.textContent = name;
  totalEl.textContent = '共 ' + durationMin + ' 分钟';
  statusLabel.textContent = '正在专注';
  setup.classList.remove('show');
  timerUI.style.display = 'block';
  btnEnd.textContent = '结束';
  btnEnd.className = 'btn btn-end';
  btnRow.style.display = '';
  ring.style.strokeDasharray = CIRCUMFERENCE;
  updateRingAndDisplay();
  clearInterval(timerId);
  timerId = setInterval(tick, 250);
  saveState();
}

// 异步检查服务端是否有进行中活动（H5 独立打开时）
async function checkServerOngoing() {
  if (!urlOpenid) return;
  try {
    const res = await fetch('/api/ongoing/' + urlOpenid);
    const data = await res.json();
    if (data.ok && data.ongoing) {
      const o = data.ongoing;
      const link = '?name=' + encodeURIComponent(o.name) + '&duration=' + o.plannedDuration + '&startTime=' + o.startTime + '&openid=' + urlOpenid;
      window.location.replace(link);
    }
  } catch(e) {}
}

// ========== 初始化 ==========
if (urlName && urlDur && urlStartTime) {
  // 有服务端时间戳：无论何时打开，始终根据服务端时间计算正确状态
  const durMin = parseInt(urlDur);
  const serverTs = parseInt(urlStartTime);
  const totalSec = durMin * 60;
  const elapsed = Math.floor((Date.now() - serverTs) / 1000);
  const remain = Math.max(0, totalSec - elapsed);

  if (remain <= 0) {
    // 时间已到 → 显示已完成状态
    showAlreadyDone(urlName, durMin);
  } else {
    // 还在进行中 → 检查 localStorage 恢复或重新开始
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (saved && saved.serverStartTime === serverTs && saved.name === urlName && saved.remaining > 0) {
      startTimerFrom(urlName, durMin, saved.remaining, serverTs, saved.timerStartTime);
    } else {
      clearState();
      startTimer(urlName, durMin, serverTs, remain);
    }
  }
} else if (urlName && urlDur) {
  // 无服务端时间戳（独立访问或旧链接）
  const durMin = parseInt(urlDur);
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
  if (saved && saved.name === urlName && saved.totalSeconds === durMin * 60) {
    const elapsed = Math.floor((Date.now() - saved.startTime) / 1000);
    const remain = Math.max(0, saved.totalSeconds - elapsed);
    if (remain > 0) {
      startTimerFrom(saved.name, durMin, remain, saved.serverStartTime, saved.timerStartTime);
    } else {
      clearState();
      showAlreadyDone(urlName, durMin);
    }
  } else {
    clearState();
    apiStart(urlName, durMin);
    startTimer(urlName, durMin);
  }
} else {
  // 无活动参数：检查 localStorage
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
  if (saved) {
    const elapsed = Math.floor((Date.now() - (saved.timerStartTime || 0)) / 1000);
    const remain = Math.max(0, saved.totalSeconds - elapsed);
    if (saved.isOvertime || remain <= 0) {
      showAlreadyDone(saved.name, saved.totalSeconds / 60);
    } else if (remain > 0) {
      startTimerFrom(saved.name, saved.totalSeconds / 60, remain, saved.serverStartTime, saved.timerStartTime);
    }
  } else {
    setup.classList.add('show');
    // 如果有 openid（从时钟按钮进入），异步检查服务端是否有进行中活动
    checkServerOngoing();
  }
}
</script>

</body>
</html>
